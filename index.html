<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paleta de Colores</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <header> 
        <h1>Paleta de Colores</h1>
    </header>
    
    <main>
        <label for="tamano-paleta">¿Cuántos colores quieres a la vez?</label>
        <section>
            <select id="tamano-paleta">
                <option value="6">6 colores</option>
                <option value="8">8 colores</option>
                <option value="9">9 colores</option>
            </select>
            <button id="generar-colores">Generar paleta</button>
        </section>

        <section id="paleta"></section>
    </main>
    
    <footer>
        <p>Desarrollado by Bryan Garcia</p>
        <p>Redes sociales @stivengarciac</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
